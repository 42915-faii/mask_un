<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced AI Vision Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0b0f19;
            --panel-bg: rgba(17, 24, 39, 0.7);
            --border-neon: rgba(56, 189, 248, 0.2);
            --neon-blue: #0ea5e9;
            --neon-purple: #a855f7;
            --neon-green: #10b981;
            --text-main: #f3f4f6;
            --text-muted: #6b7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .dashboard {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-neon);
            border-radius: 28px;
            padding: 35px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(56, 189, 248, 0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(to right, #38bdf8, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .header p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* ส่วนควบคุมหลัก */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .main-grid {
                grid-template-columns: 320px 1fr;
            }
        }

        /* ส่วนกล้องและการนับถอยหลัง */
        .camera-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .viewfinder {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* วงแหวน SVG นับถอยหลังรอบกล้อง */
        .countdown-svg {
            position: absolute;
            width: 260px;
            height: 260px;
            transform: rotate(-90deg);
            pointer-events: none;
        }

        .countdown-svg circle {
            fill: none;
            stroke-width: 4;
        }

        .countdown-svg .bg-circle {
            stroke: rgba(255, 255, 255, 0.05);
        }

        .countdown-svg .passed-circle {
            stroke: var(--neon-blue);
            stroke-dasharray: 754; /* 2 * PI * r (r=120) */
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.1s linear;
        }

        .webcam-container {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            overflow: hidden;
            background: #000;
            z-index: 2;
        }

        .webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        .btn-action {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 30px;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
        }

        .btn-action:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-action:disabled {
            background: #1f2937;
            color: #4b5563;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ส่วนแสดงผลลัพธ์ */
        .results-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--neon-blue);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .analysis-panel {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            flex-grow: 1;
        }

        .class-row {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            position: relative;
            transition: all 0.3s ease;
        }

        /* สไตล์พิเศษเวลาคลาสนี้ชนะ */
        .class-row.winner {
            border-color: var(--neon-green);
            background: rgba(16, 185, 129, 0.04);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
        }

        .class-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .class-name {
            font-weight: 500;
            font-size: 1rem;
        }

        .class-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            color: var(--neon-blue);
        }

        .class-row.winner .class-value {
            color: var(--neon-green);
        }

        .bar-container {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            background: var(--neon-blue);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .class-row.winner .bar-fill {
            background: linear-gradient(90deg, var(--neon-green), #34d399);
        }

        /* กล่องบันทึกประวัติ (Log) */
        .log-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 14px;
            padding: 15px;
            height: 110px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .log-item {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            display: flex;
            gap: 10px;
        }

        .log-time { color: var(--neon-purple); }
        .log-text { color: #e5e7eb; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>Vision Intelligence</h1>
        <p>ระบบตรวจจับอัจฉริยะประมวลผลอัตโนมัติทุกๆ 3.0 วินาที</p>
    </div>

    <div class="main-grid">
        <!-- ฝั่งควบคุมกิริยา / กล้อง -->
        <div class="camera-wrapper">
            <div class="viewfinder">
                <!-- วงแหวนนับถอยหลัง SVG -->
                <svg class="countdown-svg">
                    <circle class="bg-circle" cx="130" cy="130" r="120"></circle>
                    <circle class="passed-circle" id="countdown-ring" cx="130" cy="130" r="120"></circle>
                </svg>
                <div class="webcam-container" id="webcam-box">
                    <!-- ลำกล้องวิดีโอจะถูกฝังที่นี่ -->
                </div>
            </div>
            
            <button class="btn-action" id="action-btn" onclick="startSystem()">INITIALIZE CAMERA</button>
        </div>

        <!-- ฝั่งมอนิเตอร์และวิเคราะห์ผล -->
        <div class="results-wrapper">
            <div class="analysis-panel">
                <div class="panel-title">
                    <span>Live Classification</span>
                    <span id="next-trigger" style="color: var(--text-muted);">READY</span>
                </div>
                
                <div id="predictions-target">
                    <div style="text-align: center; color: var(--text-muted); padding-top: 40px; font-style: italic;">
                        รอการเชื่อมต่อสัญญาณภาพ...
                    </div>
                </div>
            </div>

            <!-- กล่อง Log เก็บประวัติ -->
            <div>
                <div class="panel-title" style="font-size: 0.75rem;">System Log History</div>
                <div class="log-panel" id="log-box">
                    <div class="log-item">> System standing by. Awaiting user initialization...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
    const URL = "https://teachablemachine.withgoogle.com/models/VH2nKLnoKP/";
    let model, webcam, maxPredictions;
    let timeRemaining = 3000; 
    const intervalTime = 3000; // รอบการทำงาน 3 วินาที
    const updateTick = 100; // อัปเดต UI วงแหวนทุกๆ 0.1 วินาที

    async function startSystem() {
        const btn = document.getElementById("action-btn");
        btn.disabled = true;
        btn.innerText = "LOADING MODEL...";
        addLog("Loading AI Model weights and configurations...");

        try {
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(240, 240, true);
            await webcam.setup();
            await webcam.play();

            document.getElementById("webcam-box").innerHTML = "";
            document.getElementById("webcam-box").appendChild(webcam.canvas);

            // สร้าง Element รอรับข้อมูล
            buildUIStructures();
            btn.innerText = "SYSTEM ACTIVE";
            addLog("Webcam stream connected successfully.");

            // เริ่ม Render วิดีโอสด
            window.requestAnimationFrame(loopWebcam);

            // รันครั้งแรกทันที
            await executePrediction();

            // เริ่มระบบนับถอยหลัง 3 วินาที และยิงคำสั่ง
            initTimeline();

        } catch (e) {
            console.error(e);
            btn.disabled = false;
            btn.innerText = "TRY AGAIN";
            addLog("ERROR: Failed to initialize. Check camera permissions.");
        }
    }

    async function loopWebcam() {
        webcam.update();
        window.requestAnimationFrame(loopWebcam);
    }

    function buildUIStructures() {
        const target = document.getElementById("predictions-target");
        target.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {
            target.innerHTML += `
                <div class="class-row" id="row-${i}">
                    <div class="class-meta">
                        <span class="class-name" id="name-${i}">Loading...</span>
                        <span class="class-value" id="val-${i}">0%</span>
                    </div>
                    <div class="bar-container">
                        <div class="bar-fill" id="bar-${i}"></div>
                    </div>
                </div>
            `;
        }
    }

    // จัดการ Timeline ควบคุมวงแหวนอนิเมชัน และยิงการตรวจจับทุก 3 วินาที
    function initTimeline() {
        const ring = document.getElementById("countdown-ring");
        const maxOffset = 754; // ความยาวเส้นรอบวง SVG

        setInterval(() => {
            timeRemaining -= updateTick;
            
            if (timeRemaining <= 0) {
                timeRemaining = intervalTime;
                executePrediction(); // ครบ 3 วินาที สั่งทายผล
            }

            // คำนวณความยาววงแหวนที่เหลืออยู่
            const offset = maxOffset - (maxOffset * (timeRemaining / intervalTime));
            ring.style.strokeDashoffset = offset;
            
            document.getElementById("next-trigger").innerText = `NEXT SCAN IN: ${(timeRemaining/1000).toFixed(1)}s`;
        }, updateTick);
    }

    async function executePrediction() {
        if (!model || !webcam) return;
        const prediction = await model.predict(webcam.canvas);

        let highestVal = -1;
        let winnerIndex = -1;

        // หา Class ที่เปอร์เซ็นต์เยอะที่สุดในรอบนั้นๆ
        for (let i = 0; i < maxPredictions; i++) {
            if (prediction[i].probability > highestVal) {
                highestVal = prediction[i].probability;
                winnerIndex = i;
            }
        }

        // อัปเดตข้อมูลขึ้นแท่ง UI
        for (let i = 0; i < maxPredictions; i++) {
            const name = prediction[i].className;
            const prob = prediction[i].probability;
            const pct = Math.round(prob * 100);

            document.getElementById(`name-${i}`).innerText = name;
            document.getElementById(`val-${i}`).innerText = pct + "%";
            document.getElementById(`bar-${i}`).style.width = pct + "%";

            // ไฮไลต์ถ้าเป็นตัวที่ชนะ
            const row = document.getElementById(`row-${i}`);
            if (i === winnerIndex && pct > 0) {
                row.classList.add("winner");
            } else {
                row.classList.remove("winner");
            }
        }

        // บันทึกสถิติลง Log Box
        if (winnerIndex !== -1) {
            const winnerName = prediction[winnerIndex].className;
            const winnerPct = Math.round(prediction[winnerIndex].probability * 100);
            addLog(`Detected: ${winnerName} (${winnerPct}%)`);
        }
    }

    // ฟังก์ชันเพิ่มข้อความ Log ด้านล่าง
    function addLog(text) {
        const logBox = document.getElementById("log-box");
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
        
        logBox.innerHTML += `<div class="log-item"><span class="log-time">[${timeStr}]</span><span class="log-text">> ${text}</span></div>`;
        logBox.scrollTop = logBox.scrollHeight; // เลื่อน Log ลงมาล่างสุดเสมอ
    }
</script>

</body>
</html>
