<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Classification - Teachable Machine</title>
    <!-- นำเข้า Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, #c084fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .btn-start {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .btn-start:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
        }

        .btn-start:disabled {
            background: #475569;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ส่วนแสดงผลหลัก */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        @media (min-width: 640px) {
            .dashboard-grid {
                grid-template-columns: 1fr 1fr;
                align-items: start;
            }
        }

        /* โซนกล้องเว็บแคม */
        .webcam-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .webcam-wrapper {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--primary-color);
            box-shadow: 0 0 25px rgba(79, 70, 229, 0.2);
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* ทำให้ Canvas จาก Teachable Machine แสดงผลพอดีวงกลม */
        .webcam-wrapper canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        /* วงแหวนนับถอยหลัง 3 วินาที */
        .timer-container {
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .timer-container.active {
            opacity: 1;
        }

        .countdown-pulse {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        /* โซนแสดงผลลัพธ์ (Label & Progress) */
        .results-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 24px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 260px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .placeholder-text {
            color: var(--text-muted);
            text-align: center;
            font-style: italic;
        }

        .prediction-item {
            margin-bottom: 18px;
        }

        .prediction-item:last-child {
            margin-bottom: 0;
        }

        .label-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .progress-bar-bg {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            height: 12px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #6366f1, #a855f7);
            height: 100%;
            width: 0%;
            border-radius: 8px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Teachable Machine Image Model</h1>
    <div class="subtitle">ระบบตรวจจับและจำแนกรูปภาพด้วย AI ประมวลผลทุกๆ 3 วินาที</div>
    
    <button type="button" class="btn-start" id="start-btn" onclick="init()">เปิดใช้งานกล้อง</button>

    <div class="dashboard-grid">
        <!-- ฝั่งซ้าย: กล้อง -->
        <div class="webcam-section">
            <div class="webcam-wrapper" id="webcam-container">
                <!-- Canvas ของเว็บแคมจะถูกเพิ่มที่นี่ -->
            </div>
            <div class="timer-container" id="timer-status">
                <div class="countdown-pulse"></div>
                <span>กำลังวิเคราะห์ผลต่อเนื่อง (ทุกๆ 3 วินาที)</span>
            </div>
        </div>

        <!-- ฝั่งขวา: ผลลัพธ์ -->
        <div class="results-section" id="label-container">
            <div class="placeholder-text">กดปุ่ม "เปิดใช้งานกล้อง" เพื่อเริ่มการวิเคราะห์</div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์โมเดลของคุณ
    const URL = "https://teachablemachine.withgoogle.com/models/VH2nKLnoKP/";

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval; // ตัวแปรสำหรับคุม Loop 3 วินาที

    async function init() {
        // ปิดการใช้งานปุ่มหลังกด เพื่อป้องกันการกดซ้ำ
        const startBtn = document.getElementById("start-btn");
        startBtn.disabled = true;
        startBtn.innerText = "กำลังโหลดโมเดล...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        try {
            // โหลด Model
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // ตั้งค่า Webcam (ปรับขนาดส่งเข้า Model เป็น 260x260 ให้เข้ากับดีไซน์วงกลม)
            const flip = true; 
            webcam = new tmImage.Webcam(260, 260, flip); 
            await webcam.setup(); 
            await webcam.play();

            // ล้างข้อความ Placeholder ในตัวครอบกล้องและผลลัพธ์
            document.getElementById("webcam-container").innerHTML = "";
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";

            // นำวิดีโอเว็บแคมใส่ใน DOM
            document.getElementById("webcam-container").appendChild(webcam.canvas);

            // สร้างโครงสร้าง Progress Bar สำหรับทุกๆ Class ที่ดึงมาจาก Model
            for (let i = 0; i < maxPredictions; i++) {
                const predictionItem = document.createElement("div");
                predictionItem.className = "prediction-item";
                
                predictionItem.innerHTML = `
                    <div class="label-info">
                        <span class="class-name">กำลังโหลด...</span>
                        <span class="class-percentage">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill"></div>
                    </div>
                `;
                labelContainer.appendChild(predictionItem);
            }

            startBtn.innerText = "ระบบกำลังทำงาน";
            document.getElementById("timer-status").classList.add("active");

            // เริ่มการ Render ภาพเคลื่อนไหวของเว็บแคมแบบ Real-time (ให้ผู้ใช้เห็นตัวเองขยับได้ลื่นไหล)
            window.requestAnimationFrame(webcamLoop);

            // ทำการทำนายผลครั้งแรกทันที
            await predict();

            // **หัวใจหลัก:** สั่งให้เรียกฟังก์ชัน predict() ทำงานซ้ำทุกๆ 3000 มิลลิวินาที (3 วินาที)
            predictInterval = setInterval(async () => {
                await predict();
            }, 3000);

        } catch (error) {
            console.error("Error initializing Teachable Machine:", error);
            startBtn.disabled = false;
            startBtn.innerText = "ลองใหม่อีกครั้ง";
            alert("ไม่สามารถเข้าถึงกล้องหรือโหลดโมเดลได้ กรุณาตรวจสอบสิทธิ์การใช้กล้อง");
        }
    }

    // ฟังก์ชันอัปเดตเฟรมภาพจากเว็บแคมให้แสดงผล Real-time (แต่ยังไม่ได้ทายผล)
    async function webcamLoop() {
        webcam.update(); 
        window.requestAnimationFrame(webcamLoop);
    }

    // ฟังก์ชันทำนายผลภาพ (ที่จะถูกเรียกทุกๆ 3 วินาที)
    async function predict() {
        if (!model || !webcam) return;

        // ส่งภาพใน Canvas ไปให้ AI ประมวลผล
        const prediction = await model.predict(webcam.canvas);
        
        // นำผลลัพธ์ไปอัปเดตบนหน้าจอ UI ที่เราสร้างไว้
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probability = prediction[i].probability;
            const percentage = Math.round(probability * 100); // แปลงเป็นเปอร์เซ็นต์เต็ม 100

            const item = labelContainer.childNodes[i];
            
            // อัปเดตข้อความชื่อ Class และ เปอร์เซ็นต์
            item.querySelector(".class-name").innerText = className;
            item.querySelector(".class-percentage").innerText = percentage + "%";
            
            // ขยับความยาวของ Progress Bar ด้วย CSS Transition
            item.querySelector(".progress-bar-fill").style.width = percentage + "%";
        }
    }
</script>

</body>
</html>
